<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget API Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 Budget API Dashboard</h1>
      <nav class="table-nav">
        <button class="table-btn active" data-table="users">👤 Users</button>
        <button class="table-btn" data-table="accounts">🏦 Accounts</button>
        <button class="table-btn" data-table="transactions">💳 Transactions</button>
        <button class="table-btn" data-table="categories">📂 Categories</button>
        <button class="table-btn" data-table="budgets">📊 Budgets</button>
        <button class="table-btn" data-table="budget-periods">📅 Budget Periods</button>
        <button class="table-btn" data-table="goals">🎯 Goals</button>
        <button class="table-btn" data-table="loans">🏧 Loans</button>
        <button class="table-btn" data-table="contacts">📞 Contacts</button>
        <button class="table-btn" data-table="tags">🏷️ Tags</button>
        <button class="table-btn" data-table="alerts">🔔 Alerts</button>
        <button class="table-btn" data-table="recurring-patterns">🔄 Recurring</button>
        <button class="table-btn" data-table="audit-logs">📝 Audit Logs</button>
      </nav>
    </header>

    <main>
      <div id="message-container"></div>
      <div id="content" class="loading">Loading...</div>
    </main>
  </div>

  <!-- Modal for Create/Edit -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modal-title">Add Record</h2>
      <form id="modal-form"></form>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button onclick="saveRecord()" class="success">Save</button>
      </div>
    </div>
  </div>

  <script>
    let currentTable = 'users';
    let currentRecords = [];
    let editingId = null;
    const API_URL = 'http://localhost:3000/api';

    // Load table data
    async function loadTable(table) {
      currentTable = table;
      editingId = null;
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading data...</div>';

      try {
        const response = await fetch(`${API_URL}/${table}?limit=100`);
        const result = await response.json();

        if (result.success) {
          currentRecords = result.data;
          renderTable(result.data);
        } else {
          content.innerHTML = `<div class="error">Error: ${result.error}</div>`;
        }
      } catch (error) {
        content.innerHTML = `<div class="error">Error loading data: ${error.message}</div>`;
      }
    }

    // Render table
    function renderTable(records) {
      const content = document.getElementById('content');

      if (records.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <p>No records found</p>
            <button onclick="openModal()" class="success">Add Record</button>
          </div>
        `;
        return;
      }

      const columns = Object.keys(records[0]);
      const html = `
        <button onclick="openModal()" class="success">+ Add Record</button>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                ${columns.map(col => `<th>${col}</th>`).join('')}
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${records.map(record => `
                <tr>
                  ${columns.map(col => {
                    let value = record[col];
                    if (value === null) value = '<em>null</em>';
                    else if (typeof value === 'object') value = JSON.stringify(value);
                    else if (typeof value === 'boolean') value = value ? '✓' : '✗';
                    return `<td>${value}</td>`;
                  }).join('')}
                  <td class="actions">
                    <button onclick='editRecord(${record.id})'>Edit</button>
                    <button class="danger" onclick='deleteRecord(${record.id})'>Delete</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      content.innerHTML = html;
    }

    // Open modal
    function openModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = `Add ${currentTable}`;
      const form = document.getElementById('modal-form');
      
      // Generate form fields from current records' columns
      if (currentRecords.length > 0) {
        const columns = Object.keys(currentRecords[0]).filter(col => col !== 'id');
        form.innerHTML = columns.map(col => {
          return `
            <div class="form-group">
              <label>${col}</label>
              <input type="text" name="${col}" value="" />
            </div>
          `;
        }).join('');
      }
      
      document.getElementById('modal').classList.add('active');
    }

    // Close modal
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    // Edit record
    function editRecord(id) {
      editingId = id;
      const record = currentRecords.find(r => r.id === id);
      const form = document.getElementById('modal-form');
      const columns = Object.keys(record).filter(col => col !== 'id');

      form.innerHTML = columns.map(col => {
        const value = record[col];
        const type = typeof value === 'number' ? 'number' : 'text';
        return `
          <div class="form-group">
            <label>${col}</label>
            <input type="${type}" name="${col}" value="${value || ''}" />
          </div>
        `;
      }).join('');

      document.getElementById('modal-title').textContent = `Edit ${currentTable} (ID: ${id})`;
      document.getElementById('modal').classList.add('active');
    }

    // Save record
    async function saveRecord() {
      const form = document.getElementById('modal-form');
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);

      const url = `${API_URL}/${currentTable}${editingId ? `/${editingId}` : ''}`;
      const method = editingId ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await response.json();

        if (result.success) {
          showMessage(`Record ${editingId ? 'updated' : 'created'} successfully!`, 'success');
          closeModal();
          loadTable(currentTable);
        } else {
          showMessage(`Error: ${result.error}`, 'error');
        }
      } catch (error) {
        showMessage(`Error: ${error.message}`, 'error');
      }
    }

    // Delete record
    async function deleteRecord(id) {
      if (!confirm('Are you sure you want to delete this record?')) return;

      try {
        const response = await fetch(`${API_URL}/${currentTable}/${id}`, {
          method: 'DELETE',
        });

        const result = await response.json();

        if (result.success) {
          showMessage('Record deleted successfully!', 'success');
          loadTable(currentTable);
        } else {
          showMessage(`Error: ${result.error}`, 'error');
        }
      } catch (error) {
        showMessage(`Error: ${error.message}`, 'error');
      }
    }

    // Show message
    function showMessage(message, type) {
      const container = document.getElementById('message-container');
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
      const html = `<div class="${className}">${message}</div>`;
      container.innerHTML = html;

      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    // Table button listeners
    document.querySelectorAll('.table-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        loadTable(e.target.dataset.table);
      });
    });

    // Close modal when clicking outside
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    // Load initial table
    loadTable('users');
  </script>
</body>
</html>
